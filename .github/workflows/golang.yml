name: Golang

on:
  workflow_dispatch:  {}
  push:
    branches:
      - master
      - "pull-request/[0-9]+"
      - release-*

jobs:
  check:
    runs-on: linux-amd64-cpu4
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
        name: Checkout code

      - name: Get Golang version
        id: vars
        run: |
          GOLANG_VERSION=$( grep "GOLANG_VERSION ?=" versions.mk )
          echo "GOLANG_VERSION=${GOLANG_VERSION##GOLANG_VERSION ?= }" >> $GITHUB_ENV

      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GOLANG_VERSION }}

      - name: Setup Go Proxy
        id: setup-go-proxy
        uses: nv-gha-runners/setup-artifactory-go-proxy@main

## (cdesiniotis) enable once lint errors are addressed
##      - name: Lint
##        uses: golangci/golangci-lint-action@v9
##        with:
##          version: latest
##          args: -v --timeout 5m
##          skip-cache: true

      - name: Check golang modules
        env:
          GOPROXY: ${{ steps.setup-go-proxy.outputs.goproxy-url }}
        run: |
          make check-vendor

  test:
    name: Unit test
    runs-on: linux-amd64-cpu4
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Get Golang version
        id: vars
        run: |
          GOLANG_VERSION=$( grep "GOLANG_VERSION ?=" versions.mk )
          echo "GOLANG_VERSION=${GOLANG_VERSION##GOLANG_VERSION ?= }" >> $GITHUB_ENV

      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GOLANG_VERSION }}

      - name: Setup Go Proxy
        id: setup-go-proxy
        uses: nv-gha-runners/setup-artifactory-go-proxy@main

      - name: Run unit tests and generate coverage report
        env:
          GOPROXY: ${{ steps.setup-go-proxy.outputs.goproxy-url }}
        run: make coverage

      - name: Upload to Coveralls
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          file: coverage.out

  build:
    name: Build
    runs-on: linux-amd64-cpu4
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Get Golang version
        id: vars
        run: |
          GOLANG_VERSION=$( grep "GOLANG_VERSION ?=" versions.mk )
          echo "GOLANG_VERSION=${GOLANG_VERSION##GOLANG_VERSION ?= }" >> $GITHUB_ENV

      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GOLANG_VERSION }}

      - name: Setup Go Proxy
        id: setup-go-proxy
        uses: nv-gha-runners/setup-artifactory-go-proxy@main

      - env:
          GOPROXY: ${{ steps.setup-go-proxy.outputs.goproxy-url }}
        run: |
          make build
